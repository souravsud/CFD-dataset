terrain:
  center_lat: null
  center_lon: null
  crop_size_km: 30
  rotation_deg: null
  smoothing_sigma: 0
  center_coordinates: false
  
grid:
  nx: 361
  ny: 361
  x_grading:
    - [0.35, 0.0835, 0.025]
    - [0.30, 0.833, 1.0]
    - [0.35, 0.0835, 40.0] 
  y_grading:
    - [0.35, 0.0835, 0.025]
    - [0.30, 0.833, 1.0]
    - [0.35, 0.0835, 40.0] 
    
mesh:
  domain_height: 5000.0
  total_z_cells: 76
  terrain_normal_first_layer: true
  z_grading:
    - [0.04, 0.658, 1.0]
    - [0.96, 0.342, 180.0]

boundary:
  aoi_fraction: 0.3
  boundary_mode: directional
  flat_boundary_thickness_fraction: 0.08
  enabled_boundaries: [east, west]
  smoothing_method: mean
  kernel_progression: exponential
  base_kernel_size: 4
  progression_rate: 36
  boundary_flatness_mode: blend_target
  
visualization:
  create_plots: true
  show_grid_lines: true
  save_high_res: true
  plot_format: png
  dpi: 150
