# ABL_BC_generator settings used by generateInputs.py.
# Keys map to abl_bc_generator.config dataclasses.

atmospheric:
  u_star: 0.25
  z0: 0.0
  h_bl: 1500.0
  wind_dir_met: 225.0
  # Optional (null means auto/unused by package defaults)
  U_ref: null
  z_ref: null

turbulence:
  Cmu: 0.033
  kappa: 0.4

mesh:
  patch_names:
    inlet: inlet
    outlet: outlet
    ground: ground
    sky: sky
    sides: sides

openfoam:
  version: "1.0"
  foam_version: v2512
  wall_functions:
    ground_k:
      type: kqRWallFunction
      value: 0.0
    ground_epsilon:
      type: atmEpsilonWallFunction
      value: 0.0016
    ground_nut:
      type: atmNutkWallFunction
      value: 0.0
  boundary_conditions:
    U:
      outlet:
        type: zeroGradient
      ground:
        type: noSlip
      sky:
        type: slip
      sides:
        type: slip
    k:
      outlet:
        type: zeroGradient
      sky:
        type: slip
      sides:
        type: slip
    epsilon:
      outlet:
        type: zeroGradient
      sky:
        type: slip
      sides:
        type: slip
    nut:
      sky:
        type: slip
